<!doctype html>
<html lang="th" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory ระบบหายใจ</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Prompt', sans-serif; }
    
    .card-container {
      perspective: 1000px;
    }
    
    .card-inner {
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }
    
    .card-flipped .card-inner {
      transform: rotateY(180deg);
    }
    
    .card-front, .card-back {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    
    .card-back {
      transform: rotateY(180deg);
    }
    
    .card-matched {
      opacity: 0.6;
      pointer-events: none;
    }
    
    .player-active {
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.5); }
      50% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
    }
    
    @keyframes celebrate {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .celebrate {
      animation: celebrate 0.5s ease-in-out;
    }
    
    .lung-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .btn-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full lung-bg overflow-auto"><!-- Screen 1: Player Selection -->
   <div id="screen-players" class="min-h-full flex items-center justify-center p-4">
    <div class="glass-card rounded-3xl p-8 max-w-md w-full shadow-2xl">
     <div class="text-center mb-8">
      <div class="text-6xl mb-4">
       🫁
      </div>
      <h1 id="main-title" class="text-3xl font-bold text-gray-800 mb-2">Memory ระบบหายใจ</h1>
      <p class="text-gray-600">จับคู่อวัยวะกับหน้าที่ให้ถูกต้อง</p>
     </div>
     <div class="mb-6"><label class="block text-gray-700 font-medium mb-3 text-center">เลือกจำนวนผู้เล่น</label>
      <div class="grid grid-cols-2 gap-3"><button onclick="selectPlayers(1)" class="btn-hover bg-gradient-to-r from-blue-500 to-blue-600 text-white py-4 rounded-xl font-semibold text-lg transition-all duration-300 hover:from-blue-600 hover:to-blue-700"> 👤 1 คน </button> <button onclick="selectPlayers(2)" class="btn-hover bg-gradient-to-r from-green-500 to-green-600 text-white py-4 rounded-xl font-semibold text-lg transition-all duration-300 hover:from-green-600 hover:to-green-700"> 👥 2 คน </button> <button onclick="selectPlayers(3)" class="btn-hover bg-gradient-to-r from-purple-500 to-purple-600 text-white py-4 rounded-xl font-semibold text-lg transition-all duration-300 hover:from-purple-600 hover:to-purple-700"> 👥 3 คน </button> <button onclick="selectPlayers(4)" class="btn-hover bg-gradient-to-r from-orange-500 to-orange-600 text-white py-4 rounded-xl font-semibold text-lg transition-all duration-300 hover:from-orange-600 hover:to-orange-700"> 👥 4 คน </button>
      </div>
     </div>
     <div class="mb-6"><label class="block text-gray-700 font-medium mb-3 text-center">เลือกขนาดกระดาน</label>
      <div class="grid grid-cols-2 gap-3"><button onclick="selectBoardSize('4x4')" id="btn-4x4" class="btn-hover bg-gradient-to-r from-pink-500 to-pink-600 text-white py-3 rounded-xl font-semibold transition-all duration-300 ring-4 ring-pink-300"> 4×4 (8 คู่) </button> <button onclick="selectBoardSize('6x6')" id="btn-6x6" class="btn-hover bg-gradient-to-r from-indigo-400 to-indigo-500 text-white py-3 rounded-xl font-semibold transition-all duration-300"> 6×6 (18 คู่) </button>
      </div>
     </div>
    </div>
   </div><!-- Screen 2: Name Input -->
   <div id="screen-names" class="min-h-full flex items-center justify-center p-4 hidden">
    <div class="glass-card rounded-3xl p-8 max-w-md w-full shadow-2xl">
     <div class="text-center mb-6">
      <div class="text-5xl mb-3">
       ✏️
      </div>
      <h2 class="text-2xl font-bold text-gray-800">ลงชื่อผู้เล่น</h2>
     </div>
     <div id="name-inputs" class="space-y-4 mb-6"></div><button onclick="startGame()" class="btn-hover w-full bg-gradient-to-r from-emerald-500 to-teal-500 text-white py-4 rounded-xl font-bold text-xl transition-all duration-300 hover:from-emerald-600 hover:to-teal-600"> 🎮 เริ่มเกม! </button> <button onclick="goBack()" class="w-full mt-3 bg-gray-200 text-gray-700 py-3 rounded-xl font-medium transition-all duration-300 hover:bg-gray-300"> ← ย้อนกลับ </button>
    </div>
   </div><!-- Screen 3: Game Board -->
   <div id="screen-game" class="min-h-full p-4 hidden"><!-- Player Scores -->
    <div id="player-scores" class="flex flex-wrap justify-center gap-3 mb-4"></div><!-- Current Turn -->
    <div class="text-center mb-4">
     <div class="inline-block glass-card rounded-full px-6 py-2 shadow-lg"><span class="text-gray-600">ตาของ: </span> <span id="current-player" class="font-bold text-blue-600"></span>
     </div>
    </div><!-- Game Board -->
    <div id="game-board" class="max-w-2xl mx-auto"></div><!-- Message -->
    <div id="game-message" class="text-center mt-4 text-white font-medium text-lg"></div>
   </div><!-- Screen 4: Results -->
   <div id="screen-results" class="min-h-full flex items-center justify-center p-4 hidden">
    <div class="glass-card rounded-3xl p-8 max-w-md w-full shadow-2xl text-center">
     <div class="text-6xl mb-4">
      🏆
     </div>
     <h2 class="text-3xl font-bold text-gray-800 mb-2">จบเกม!</h2>
     <div id="winner-announce" class="text-xl text-purple-600 font-semibold mb-6"></div>
     <div id="final-scores" class="space-y-3 mb-6"></div><button onclick="restartGame()" class="btn-hover w-full bg-gradient-to-r from-blue-500 to-purple-500 text-white py-4 rounded-xl font-bold text-xl transition-all duration-300 hover:from-blue-600 hover:to-purple-600"> 🔄 เล่นใหม่ </button>
    </div>
   </div>
  </div>
  <script>
    // Game Configuration
    const defaultConfig = {
      game_title: 'Memory ระบบหายใจ'
    };
    
    let config = { ...defaultConfig };
    
    // Respiratory System Card Pairs (Organ ↔ Function)
    const cardPairs = [
      { organ: '👃 จมูก', function: 'กรองและทำความชื้นอากาศ' },
      { organ: '🫁 ปอด', function: 'แลกเปลี่ยนก๊าซ O₂ และ CO₂' },
      { organ: '💨 หลอดลม', function: 'ทางผ่านของอากาศสู่ปอด' },
      { organ: '🔴 ถุงลม', function: 'พื้นที่แลกเปลี่ยนก๊าซในปอด' },
      { organ: '🎤 กล่องเสียง', function: 'สร้างเสียงและปิดทางเดินอาหาร' },
      { organ: '📍 คอหอย', function: 'ทางแยกอาหารและอากาศ' },
      { organ: '🌬️ กะบังลม', function: 'กล้ามเนื้อควบคุมการหายใจ' },
      { organ: '🦠 ขนกวัด', function: 'กวาดสิ่งแปลกปลอมออกจากทางเดินหายใจ' },
      { organ: '💧 เมือก', function: 'ดักจับฝุ่นและเชื้อโรค' },
      { organ: '🫀 หลอดเลือดฝอย', function: 'รับ O₂ และปล่อย CO₂' },
      { organ: '🌡️ โพรงจมูก', function: 'ปรับอุณหภูมิอากาศ' },
      { organ: '💪 กล้ามเนื้อซี่โครง', function: 'ช่วยขยายและหดช่องอก' },
      { organ: '🛡️ เยื่อบุจมูก', function: 'ป้องกันเชื้อโรคเข้าสู่ร่างกาย' },
      { organ: '⭕ หลอดลมฝอย', function: 'กระจายอากาศไปยังถุงลม' },
      { organ: '🔵 ออกซิเจน', function: 'ก๊าซที่เซลล์ใช้สร้างพลังงาน' },
      { organ: '⚫ คาร์บอนไดออกไซด์', function: 'ของเสียจากการหายใจระดับเซลล์' },
      { organ: '🌊 เยื่อหุ้มปอด', function: 'หล่อลื่นการเคลื่อนไหวของปอด' },
      { organ: '🎯 ศูนย์หายใจ', function: 'ควบคุมจังหวะการหายใจในสมอง' }
    ];
    
    // Game State
    let gameState = {
      playerCount: 1,
      boardSize: '4x4',
      players: [],
      currentPlayerIndex: 0,
      cards: [],
      flippedCards: [],
      matchedPairs: 0,
      totalPairs: 8,
      isProcessing: false
    };
    
    const playerColors = [
      'from-blue-500 to-blue-600',
      'from-green-500 to-green-600',
      'from-purple-500 to-purple-600',
      'from-orange-500 to-orange-600'
    ];
    
    // Initialize Element SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (newConfig) => {
          config = { ...defaultConfig, ...newConfig };
          document.getElementById('main-title').textContent = config.game_title || defaultConfig.game_title;
        },
        mapToCapabilities: (cfg) => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (cfg) => new Map([
          ['game_title', cfg.game_title || defaultConfig.game_title]
        ])
      });
    }
    
    function selectBoardSize(size) {
      gameState.boardSize = size;
      const btn4x4 = document.getElementById('btn-4x4');
      const btn6x6 = document.getElementById('btn-6x6');
      
      if (size === '4x4') {
        btn4x4.classList.add('ring-4', 'ring-pink-300');
        btn4x4.classList.remove('from-pink-400', 'to-pink-500');
        btn4x4.classList.add('from-pink-500', 'to-pink-600');
        btn6x6.classList.remove('ring-4', 'ring-indigo-300');
        btn6x6.classList.remove('from-indigo-500', 'to-indigo-600');
        btn6x6.classList.add('from-indigo-400', 'to-indigo-500');
        gameState.totalPairs = 8;
      } else {
        btn6x6.classList.add('ring-4', 'ring-indigo-300');
        btn6x6.classList.remove('from-indigo-400', 'to-indigo-500');
        btn6x6.classList.add('from-indigo-500', 'to-indigo-600');
        btn4x4.classList.remove('ring-4', 'ring-pink-300');
        btn4x4.classList.remove('from-pink-500', 'to-pink-600');
        btn4x4.classList.add('from-pink-400', 'to-pink-500');
        gameState.totalPairs = 18;
      }
    }
    
    function selectPlayers(count) {
      gameState.playerCount = count;
      showScreen('screen-names');
      generateNameInputs();
    }
    
    function generateNameInputs() {
      const container = document.getElementById('name-inputs');
      container.innerHTML = '';
      
      for (let i = 0; i < gameState.playerCount; i++) {
        const div = document.createElement('div');
        div.className = 'relative';
        div.innerHTML = `
          <label class="block text-gray-600 text-sm mb-1">ผู้เล่นที่ ${i + 1}</label>
          <input type="text" id="player-name-${i}" 
            placeholder="ใส่ชื่อ..." 
            class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none transition-colors text-lg"
            value="ผู้เล่น ${i + 1}">
        `;
        container.appendChild(div);
      }
    }
    
    function goBack() {
      showScreen('screen-players');
    }
    
    function showScreen(screenId) {
      ['screen-players', 'screen-names', 'screen-game', 'screen-results'].forEach(id => {
        document.getElementById(id).classList.add('hidden');
      });
      document.getElementById(screenId).classList.remove('hidden');
    }
    
    function startGame() {
      // Collect player names
      gameState.players = [];
      for (let i = 0; i < gameState.playerCount; i++) {
        const nameInput = document.getElementById(`player-name-${i}`);
        const name = nameInput.value.trim() || `ผู้เล่น ${i + 1}`;
        gameState.players.push({ name, score: 0 });
      }
      
      // Reset game state
      gameState.currentPlayerIndex = 0;
      gameState.matchedPairs = 0;
      gameState.flippedCards = [];
      gameState.isProcessing = false;
      
      // Generate cards
      generateCards();
      
      // Show game screen
      showScreen('screen-game');
      renderScoreboard();
      renderBoard();
      updateCurrentPlayer();
    }
    
    function generateCards() {
      const pairsNeeded = gameState.totalPairs;
      const selectedPairs = cardPairs.slice(0, pairsNeeded);
      
      gameState.cards = [];
      
      selectedPairs.forEach((pair, index) => {
        gameState.cards.push({
          id: index * 2,
          pairId: index,
          type: 'organ',
          content: pair.organ,
          isFlipped: false,
          isMatched: false
        });
        gameState.cards.push({
          id: index * 2 + 1,
          pairId: index,
          type: 'function',
          content: pair.function,
          isFlipped: false,
          isMatched: false
        });
      });
      
      // Shuffle cards
      for (let i = gameState.cards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [gameState.cards[i], gameState.cards[j]] = [gameState.cards[j], gameState.cards[i]];
      }
    }
    
    function renderScoreboard() {
      const container = document.getElementById('player-scores');
      container.innerHTML = '';
      
      gameState.players.forEach((player, index) => {
        const isActive = index === gameState.currentPlayerIndex;
        const div = document.createElement('div');
        div.id = `player-score-${index}`;
        div.className = `glass-card rounded-xl px-4 py-2 ${isActive ? 'player-active ring-2 ring-blue-400' : ''}`;
        div.innerHTML = `
          <div class="text-sm text-gray-600">${player.name}</div>
          <div class="text-2xl font-bold bg-gradient-to-r ${playerColors[index]} bg-clip-text text-transparent">${player.score} คะแนน</div>
        `;
        container.appendChild(div);
      });
    }
    
    function renderBoard() {
      const container = document.getElementById('game-board');
      const gridCols = gameState.boardSize === '4x4' ? 'grid-cols-4' : 'grid-cols-6';
      const cardSize = gameState.boardSize === '4x4' ? 'h-24 sm:h-28' : 'h-16 sm:h-20';
      
      container.className = `grid ${gridCols} gap-2 sm:gap-3`;
      container.innerHTML = '';
      
      gameState.cards.forEach((card, index) => {
        const cardEl = document.createElement('div');
        cardEl.id = `card-${index}`;
        cardEl.className = `card-container ${cardSize} cursor-pointer ${card.isMatched ? 'card-matched' : ''} ${card.isFlipped ? 'card-flipped' : ''}`;
        cardEl.onclick = () => flipCard(index);
        
        const bgColor = card.type === 'organ' ? 'from-cyan-400 to-blue-500' : 'from-pink-400 to-rose-500';
        const textSize = gameState.boardSize === '4x4' ? 'text-xs sm:text-sm' : 'text-[10px] sm:text-xs';
        
        cardEl.innerHTML = `
          <div class="card-inner relative w-full h-full">
            <div class="card-front absolute inset-0 bg-gradient-to-br from-gray-700 to-gray-800 rounded-xl flex items-center justify-center shadow-lg">
              <span class="text-3xl sm:text-4xl">❓</span>
            </div>
            <div class="card-back absolute inset-0 bg-gradient-to-br ${bgColor} rounded-xl flex items-center justify-center p-1 sm:p-2 shadow-lg">
              <span class="text-white font-medium ${textSize} text-center leading-tight">${card.content}</span>
            </div>
          </div>
        `;
        
        container.appendChild(cardEl);
      });
    }
    
    function flipCard(index) {
      if (gameState.isProcessing) return;
      
      const card = gameState.cards[index];
      if (card.isFlipped || card.isMatched) return;
      if (gameState.flippedCards.length >= 2) return;
      
      // Flip the card
      card.isFlipped = true;
      gameState.flippedCards.push(index);
      
      const cardEl = document.getElementById(`card-${index}`);
      cardEl.classList.add('card-flipped');
      
      // Check for match when 2 cards are flipped
      if (gameState.flippedCards.length === 2) {
        gameState.isProcessing = true;
        setTimeout(checkMatch, 1000);
      }
    }
    
    function checkMatch() {
      const [index1, index2] = gameState.flippedCards;
      const card1 = gameState.cards[index1];
      const card2 = gameState.cards[index2];
      
      // Check if they're a matching pair (same pairId, different types)
      const isMatch = card1.pairId === card2.pairId && card1.type !== card2.type;
      
      if (isMatch) {
        // Match found!
        card1.isMatched = true;
        card2.isMatched = true;
        gameState.matchedPairs++;
        gameState.players[gameState.currentPlayerIndex].score++;
        
        // Add matched class
        document.getElementById(`card-${index1}`).classList.add('card-matched', 'celebrate');
        document.getElementById(`card-${index2}`).classList.add('card-matched', 'celebrate');
        
        showMessage('🎉 จับคู่ถูกต้อง! เล่นต่อได้อีกครั้ง', 'text-green-300');
        
        // Update scoreboard
        renderScoreboard();
        
        // Check if game is over
        if (gameState.matchedPairs === gameState.totalPairs) {
          setTimeout(endGame, 1500);
        }
      } else {
        // No match - flip cards back
        showMessage('❌ ไม่ตรงกัน เปลี่ยนตา', 'text-red-300');
        
        setTimeout(() => {
          card1.isFlipped = false;
          card2.isFlipped = false;
          document.getElementById(`card-${index1}`).classList.remove('card-flipped');
          document.getElementById(`card-${index2}`).classList.remove('card-flipped');
          
          // Next player's turn
          gameState.currentPlayerIndex = (gameState.currentPlayerIndex + 1) % gameState.playerCount;
          renderScoreboard();
          updateCurrentPlayer();
          clearMessage();
        }, 500);
      }
      
      gameState.flippedCards = [];
      gameState.isProcessing = false;
    }
    
    function updateCurrentPlayer() {
      const currentPlayer = gameState.players[gameState.currentPlayerIndex];
      document.getElementById('current-player').textContent = currentPlayer.name;
    }
    
    function showMessage(text, colorClass) {
      const msgEl = document.getElementById('game-message');
      msgEl.textContent = text;
      msgEl.className = `text-center mt-4 font-medium text-lg ${colorClass}`;
    }
    
    function clearMessage() {
      document.getElementById('game-message').textContent = '';
    }
    
    function endGame() {
      showScreen('screen-results');
      
      // Sort players by score
      const sortedPlayers = [...gameState.players].sort((a, b) => b.score - a.score);
      const highestScore = sortedPlayers[0].score;
      const winners = sortedPlayers.filter(p => p.score === highestScore);
      
      // Announce winner(s)
      const winnerEl = document.getElementById('winner-announce');
      if (winners.length > 1) {
        winnerEl.textContent = `🤝 เสมอกัน! ${winners.map(w => w.name).join(' และ ')}`;
      } else {
        winnerEl.textContent = `🥇 ผู้ชนะคือ ${winners[0].name}!`;
      }
      
      // Show final scores
      const scoresEl = document.getElementById('final-scores');
      scoresEl.innerHTML = '';
      
      sortedPlayers.forEach((player, index) => {
        const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : '🎖️';
        const div = document.createElement('div');
        div.className = 'flex items-center justify-between glass-card rounded-xl px-4 py-3';
        div.innerHTML = `
          <div class="flex items-center gap-2">
            <span class="text-2xl">${medal}</span>
            <span class="font-medium text-gray-800">${player.name}</span>
          </div>
          <span class="font-bold text-lg text-purple-600">${player.score} คะแนน</span>
        `;
        scoresEl.appendChild(div);
      });
    }
    
    function restartGame() {
      showScreen('screen-players');
      gameState = {
        playerCount: 1,
        boardSize: gameState.boardSize,
        players: [],
        currentPlayerIndex: 0,
        cards: [],
        flippedCards: [],
        matchedPairs: 0,
        totalPairs: gameState.boardSize === '4x4' ? 8 : 18,
        isProcessing: false
      };
    }
  </script>
